version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: omnilog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/omnilog
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET_KEY=mysecretkey
      - AZURE_DI_ENDPOINT=${AZURE_DI_ENDPOINT:-https://mock.azure.com}
      - AZURE_DI_KEY=${AZURE_DI_KEY:-mock_key}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/omnilog
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET_KEY=mysecretkey
      - AZURE_DI_ENDPOINT=${AZURE_DI_ENDPOINT:-https://mock.azure.com}
      - AZURE_DI_KEY=${AZURE_DI_KEY:-mock_key}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
